<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="auth-page auth-register">

<div class="auth-card">

    <button class="logo-button">
        Pay My Buddy
    </button>

    <form id="registerForm" th:action="@{/register}" method="post" class="auth-form">

        <input
                class="auth-input"
                type="text"
                name="username"
                placeholder="Username">

        <input
                class="auth-input"
                type="email"
                name="email"
                placeholder="Mail">

        <input
                class="auth-input"
                type="password"
                name="password"
                placeholder="Mot de passe">

    </form>

    <button
            class="auth-submit"
            type="submit" form="registerForm">

        S'inscrire

    </button>

</div>

</body>
</html>
