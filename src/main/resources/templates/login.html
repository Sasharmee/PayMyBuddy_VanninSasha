<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion</title>

    <meta name="description" content="Page de connexion à l'application de transfert d'argent entre amis Pay My Buddy">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="auth-page auth-login">

<main>

<div class="auth-card">

    <button class="logo-button">Pay My Buddy</button>

    <div class="auth_middle">
    <form id="loginForm" th:action="@{/login}" method="post" class="auth-form">

            <input class="auth-input" type="email" name="username" placeholder="Mail">

            <input class="auth-input" type="password" name="password" placeholder="Mot de passe">

    </form>
    </div>
        <button class="auth-submit" type="submit" form="loginForm">Se connecter</button>



</div>
</main>
</body>
</html>
